services:
  mytoolkit:
    build:
      context: .
      dockerfile: Dockerfile
    image: mytoolkit:latest
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      MYTOOLKIT_HOST: "0.0.0.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/mytoolkit", "healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - mynet

  # Optional: streamable-HTTP MCP endpoint (stdio, the default transport,
  # doesn't fit a long-running Compose service — invoke it ad hoc instead:
  # `docker run -i --rm mytoolkit:latest mcp`; see mcp/README.md).
  # Disabled by default; start explicitly with:
  #   docker compose --profile mcp up -d mytoolkit-mcp
  mytoolkit-mcp:
    profiles: ["mcp"]
    build:
      context: .
      dockerfile: Dockerfile
    image: mytoolkit:latest
    command: ["mcp", "--transport", "http", "--port", "8081"]
    ports:
      - "8081:8081"
    env_file:
      - path: .env
        required: false
    environment:
      MYTOOLKIT_HOST: "0.0.0.0"
    restart: unless-stopped
    networks:
      - mynet

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - mytoolkit
    restart: always
    networks:
      - mynet

  grafana:
    image: grafana/grafana-oss
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/mytoolkit-dashboard.json:/var/lib/grafana/dashboards/mytoolkit-dashboard.json
    depends_on:
      - prometheus
    restart: always
    networks:
      - mynet

networks:
  mynet:
    driver: "bridge"