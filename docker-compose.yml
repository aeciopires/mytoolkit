services:
  mytoolkit:
    build:
      context: .
      dockerfile: Dockerfile
    image: mytoolkit:latest
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      MYTOOLKIT_HOST: "0.0.0.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/mytoolkit", "healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - mynet

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - mytoolkit
    restart: always
    networks:
      - mynet

  grafana:
    image: grafana/grafana-oss
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/mytoolkit-dashboard.json:/var/lib/grafana/dashboards/mytoolkit-dashboard.json
    depends_on:
      - prometheus
    restart: always
    networks:
      - mynet

networks:
  mynet:
    driver: "bridge"