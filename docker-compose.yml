services:
  mytoolkit:
    build:
      context: .
      dockerfile: Dockerfile
    image: mytoolkit:latest
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      MYTOOLKIT_HOST: "0.0.0.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/mytoolkit", "healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
