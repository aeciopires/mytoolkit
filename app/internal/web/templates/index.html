{{define "content"}}
<section class="hero-card">
  <h1>MyToolkit</h1>
  <p>A suite of utilities for developers, analysts, and IT professionals — quick, practical, and secure data conversion, formatting, code generation, and manipulation, all in one place.</p>
</section>
<div class="tool-grid">
  {{range .Tools}}
  <a class="tool-card" href="/tools/{{.Slug}}">
    <span class="tool-emoji">{{.Emoji}}</span>
    <h2>{{.Name}}</h2>
    <p>{{.Description}}</p>
  </a>
  {{end}}
</div>
{{end}}
