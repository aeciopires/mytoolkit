{{define "content"}}
<section class="hero-card">
  <h1>{{.Tool.Emoji}} {{.Tool.Name}}</h1>
  <p>{{.Tool.Description}}</p>
</section>
{{template "tool-panel" .}}
{{end}}

{{define "tool-options"}}
<div class="options-row">
  <label class="switch"><input type="checkbox" name="decode" data-option> Decode</label>
  <label>Variant
    <select name="variant" data-option>
      <option value="standard">Standard</option>
      <option value="url">URL-safe</option>
    </select>
  </label>
  <label class="switch"><input type="checkbox" name="padding" data-option checked> Padding</label>
</div>
{{end}}
