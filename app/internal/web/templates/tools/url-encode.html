{{define "content"}}
<section class="hero-card">
  <h1>{{.Tool.Emoji}} {{.Tool.Name}}</h1>
  <p>{{.Tool.Description}}</p>
</section>
{{template "tool-panel" .}}
{{end}}

{{define "tool-options"}}
<div class="options-row">
  <label class="switch"><input type="checkbox" name="decode" data-option> Decode</label>
  <label>Component
    <select name="component" data-option>
      <option value="query">Query</option>
      <option value="path">Path</option>
      <option value="full">Full URL</option>
    </select>
  </label>
</div>
{{end}}
