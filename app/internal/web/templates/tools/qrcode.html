{{define "content"}}
<section class="hero-card">
  <h1>{{.Tool.Emoji}} {{.Tool.Name}}</h1>
  <p>{{.Tool.Description}}</p>
</section>
<div class="tool-panel" data-slug="qrcode">
  <div class="panel-col">
    <label for="tool-input">Text or URL</label>
    <textarea id="tool-input" placeholder="https://example.com"></textarea>
  </div>
  <div class="panel-col">
    <label>QR Code</label>
    <img class="tool-image-output" alt="Generated QR code" hidden style="max-width:100%;border-radius:20px;background:var(--color-surface);padding:1rem;">
  </div>
  <div class="options-row">
    <label>Size
      <select name="size" data-option>
        <option value="128">128px</option>
        <option value="256" selected>256px</option>
        <option value="512">512px</option>
      </select>
    </label>
  </div>
  <div class="panel-actions">
    <button class="pill-btn" type="button" data-action="download">Download QR Code</button>
    <button class="pill-btn" type="button" data-action="reset">Reset</button>
  </div>
  <p class="error-banner" id="tool-error" hidden></p>
</div>
{{end}}
