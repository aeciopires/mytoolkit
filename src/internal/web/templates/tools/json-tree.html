{{define "content"}}
<section class="hero-card">
  <h1>{{.Tool.Emoji}} {{.Tool.Name}}</h1>
  <p>{{.Tool.Description}}</p>
</section>
<div class="tool-panel" data-slug="json-tree">
  <div class="panel-col">
    <label for="tool-input">Raw JSON</label>
    <textarea id="tool-input" placeholder="Paste raw JSON here…"></textarea>
  </div>
  <div class="panel-col">
    <label>Tree</label>
    <div id="tree-output" style="min-height:240px;border-radius:20px;border:1px solid var(--color-border);background:var(--color-surface);padding:1rem;overflow:auto;font-family:ui-monospace,monospace;font-size:0.9rem;"></div>
  </div>
  <div class="panel-actions">
    <button class="pill-btn" type="button" data-action="reset">Reset</button>
  </div>
  <p class="error-banner" id="tool-error" hidden></p>
</div>
<script>
  (function () {
    var input = document.getElementById('tool-input');
    var output = document.getElementById('tree-output');
    var errorBanner = document.getElementById('tool-error');
    var timer = null;

    function renderNode(node) {
      var label = node.key ? node.key + ': ' : '';
      if (node.type === 'object' || node.type === 'array') {
        var size = (node.children || []).length;
        var details = document.createElement('details');
        details.open = true;
        var summary = document.createElement('summary');
        summary.textContent = label + node.type + '(' + size + ')';
        details.appendChild(summary);
        (node.children || []).forEach(function (c) { details.appendChild(renderNode(c)); });
        return details;
      }
      var div = document.createElement('div');
      div.textContent = label + JSON.stringify(node.value !== undefined ? node.value : null) + ' (' + node.type + ')';
      return div;
    }

    function run() {
      errorBanner.hidden = true;
      fetch('/api/v1/tools/json-tree', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input: input.value })
      }).then(function (r) { return r.json(); }).then(function (json) {
        if (!json.success) {
          errorBanner.textContent = json.error.message;
          errorBanner.hidden = false;
          output.innerHTML = '';
          return;
        }
        output.innerHTML = '';
        output.appendChild(renderNode(json.data.tree));
      });
    }

    input.addEventListener('input', function () {
      clearTimeout(timer);
      timer = setTimeout(run, 400);
    });
    document.querySelector('[data-action="reset"]').addEventListener('click', function () {
      input.value = '';
      output.innerHTML = '';
      errorBanner.hidden = true;
    });
  })();
</script>
{{end}}
