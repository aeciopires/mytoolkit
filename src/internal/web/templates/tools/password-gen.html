{{define "content"}}
<section class="hero-card">
  <h1>{{.Tool.Emoji}} {{.Tool.Name}}</h1>
  <p>{{.Tool.Description}}</p>
</section>
<div class="tool-panel" data-slug="password-gen" data-autorun>
  <div class="panel-col" style="grid-column: 1 / -1;">
    <label for="tool-output">Generated password</label>
    <textarea id="tool-output" readonly style="min-height:auto;height:3.5rem;"></textarea>
  </div>
  <div class="options-row">
    <label>Length <input type="number" name="length" data-option value="16" min="1" max="512" style="width:5rem;"></label>
    <label><input type="checkbox" name="lowercase" data-option checked> Lowercase (a-z)</label>
    <label><input type="checkbox" name="uppercase" data-option checked> Uppercase (A-Z)</label>
    <label><input type="checkbox" name="numbers" data-option checked> Numbers (0-9)</label>
    <label><input type="checkbox" name="symbols" data-option> Symbols</label>
    <label><input type="checkbox" name="exclude_confusing" data-option> Exclude confusing (i l L 1 o 0 O)</label>
    <label><input type="checkbox" name="exclude_ambiguous" data-option> Exclude ambiguous</label>
  </div>
  <div class="panel-actions">
    <button class="pill-btn" type="button" data-action="generate">Regenerate</button>
    <button class="pill-btn" type="button" data-action="copy">Copy</button>
  </div>
  <p class="error-banner" id="tool-error" hidden></p>
</div>
{{end}}
