# -- Number of pod replicas
replicaCount: 1

image:
  # -- Container image repository
  repository: mytoolkit
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag; defaults to the chart's appVersion if empty
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []
# -- Overrides the chart's computed fullname
nameOverride: ""
# -- Overrides the chart's computed fullname (release-qualified)
fullnameOverride: ""

serviceAccount:
  # -- Whether to create a ServiceAccount
  create: true
  # -- Extra annotations for the ServiceAccount
  annotations: {}
  # -- ServiceAccount name; generated if empty
  name: ""

# -- Extra pod annotations, merged with the built-in Prometheus scrape annotations
podAnnotations: {}

# -- Pod-level securityContext
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65532

# -- Container-level securityContext
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  # -- Kubernetes Service type
  type: ClusterIP
  # -- Kubernetes Service port
  port: 8080

ingress:
  # -- Enable an Ingress resource
  enabled: false
  # -- IngressClass name
  className: ""
  # -- Extra Ingress annotations
  annotations: {}
  # -- Ingress hosts
  hosts:
    - host: mytoolkit.local
      paths:
        - path: /
          pathType: Prefix
  # -- Ingress TLS configuration
  tls: []

# -- Pod resource requests/limits
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

autoscaling:
  # -- Enable a HorizontalPodAutoscaler
  enabled: false
  # -- Minimum replica count
  minReplicas: 1
  # -- Maximum replica count
  maxReplicas: 5
  # -- Target average CPU utilization percentage
  targetCPUUtilizationPercentage: 80

secret:
  # -- Create a Secret resource (placeholder for future secret-backed config; disabled by default)
  enabled: false
  # -- Secret data as plain key/value pairs (base64-encoded by the template)
  data: {}

# -- Node selector for pod scheduling
nodeSelector: {}
# -- Tolerations for pod scheduling
tolerations: []
# -- Affinity rules for pod scheduling
affinity: {}

env:
  # -- Log level: debug, info, warn, error (MYTOOLKIT_LOG_LEVEL)
  logLevel: info

mcp:
  # -- Deploy a second Deployment/Service running the MCP server over streamable HTTP (same image, disabled by default; see mcp/README.md)
  enabled: false
  # -- TCP port the MCP Deployment/Service listens on
  port: 8081
  # -- Number of MCP pod replicas (ignored when mcp.autoscaling.enabled is true)
  replicaCount: 1

  serviceAccount:
    # -- Create a dedicated ServiceAccount for the MCP Deployment; when false it reuses the shared serviceAccount above
    create: false
    # -- Extra annotations for the MCP ServiceAccount
    annotations: {}
    # -- MCP ServiceAccount name; generated if empty
    name: ""

  secret:
    # -- Create a Secret resource for the MCP Deployment (placeholder for future secret-backed config; disabled by default)
    enabled: false
    # -- Secret data as plain key/value pairs (base64-encoded by the template)
    data: {}

  ingress:
    # -- Enable an Ingress resource for the MCP Deployment (only meaningful when using the http transport)
    enabled: false
    # -- IngressClass name
    className: ""
    # -- Extra Ingress annotations
    annotations: {}
    # -- Ingress hosts
    hosts:
      - host: mytoolkit-mcp.local
        paths:
          - path: /
            pathType: Prefix
    # -- Ingress TLS configuration
    tls: []

  autoscaling:
    # -- Enable a HorizontalPodAutoscaler for the MCP Deployment
    enabled: false
    # -- Minimum replica count
    minReplicas: 1
    # -- Maximum replica count
    maxReplicas: 5
    # -- Target average CPU utilization percentage
    targetCPUUtilizationPercentage: 80

  pdb:
    # -- Enable a PodDisruptionBudget for the MCP Deployment
    enabled: false
    # -- Maximum unavailable MCP pods during a voluntary disruption
    maxUnavailable: 25%

metrics:
  serviceMonitor:
    # -- Create a Prometheus Operator ServiceMonitor (requires the CRD to be installed)
    enabled: false
    # -- Scrape interval for the ServiceMonitor
    interval: 30s
    # -- Extra labels on the ServiceMonitor (e.g. to match a Prometheus release label selector)
    labels: {}

# -- Update strategy configurations
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 6
    maxUnavailable: 0

# -- Health check on creation pod
readinessProbe:
  # -- Path of health check of application
  path: /readyz
  # -- Number of seconds after the container has started before readiness
  initialDelaySeconds: 10
  # -- Specifies that the kubelet should perform a liveness probe every N seconds
  periodSeconds: 10
  # -- Number of seconds after which the probe times out
  timeoutSeconds: 5
  # -- Minimum consecutive successes for the probe to be considered successful after having failed
  successThreshold: 1
  # -- When a probe fails, Kubernetes will try failureThreshold times before giving up.
  # Giving up in case of liveness probe means restarting the container.
  # In case of readiness probe the Pod will be marked Unready
  failureThreshold: 3

# -- Health check continuously
livenessProbe:
  # -- Path of health check of application
  path: /healthz
  # -- Number of seconds after the container has started before liveness
  initialDelaySeconds: 10
  # -- Specifies that the kubelet should perform a liveness probe every N seconds
  periodSeconds: 10
  # -- Number of seconds after which the probe times out
  timeoutSeconds: 5
  # -- Minimum consecutive successes for the probe to be considered successful after having failed
  successThreshold: 1
  # -- When a probe fails, Kubernetes will try failureThreshold times before giving up.
  # Giving up in case of liveness probe means restarting the container.
  # In case of readiness probe the Pod will be marked Unready
  failureThreshold: 3

# -- Extra environment variables appended verbatim (list of name/value or valueFrom entries)
extraEnv: []

# -- Extra arbitrary Kubernetes manifests to deploy within the release
extraManifests: []

# -- PodDisruptionBudget configuration
pdb:
  enabled: false
  maxUnavailable: 25%