{{- if and .Values.mcp.enabled .Values.mcp.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mytoolkit.mcp.serviceAccountName" . }}
  labels:
    {{- include "mytoolkit.mcp.labels" . | nindent 4 }}
  {{- with .Values.mcp.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
