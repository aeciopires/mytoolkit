{{- if .Values.mcp.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mytoolkit.mcp.fullname" . }}
  labels:
    {{- include "mytoolkit.mcp.labels" . | nindent 4 }}
data:
  MYTOOLKIT_HOST: "0.0.0.0"
  MYTOOLKIT_MCP_TRANSPORT: "http"
  MYTOOLKIT_MCP_PORT: {{ .Values.mcp.port | quote }}
  MYTOOLKIT_LOG_LEVEL: {{ .Values.env.logLevel | quote }}
{{- end }}
