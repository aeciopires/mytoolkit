apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mytoolkit.fullname" . }}-test-connection"
  labels:
    {{- include "mytoolkit.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: healthz
      image: busybox:1.36
      command: ["wget"]
      args: ["-q", "-O-", "http://{{ include "mytoolkit.fullname" . }}:{{ .Values.service.port }}/healthz"]
  restartPolicy: Never
